name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        working-directory: app
        run: npm install

      - name: Build
        working-directory: app
        env:
          # Injected at build time from GitHub Secrets — never stored in the repo.
          # The anon key is designed for browsers; data access is blocked by Supabase RLS + login.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ALLOW_SIGNUP: 'false'
        run: npm run build

      - name: Verify build output
        working-directory: app
        run: |
          ls -la dist
          test -f dist/index.html
          test -f dist/404.html
          grep -q "/${{ github.event.repository.name }}/" dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for prior Pages deployment
        run: |
          for attempt in $(seq 1 20); do
            status=$(gh api "repos/${{ github.repository }}/pages/builds/latest" --jq '.status' 2>/dev/null || echo "unknown")
            echo "Latest Pages build status: $status (attempt $attempt/20)"
            if [ "$status" != "building" ] && [ "$status" != "queued" ]; then
              exit 0
            fi
            sleep 30
          done
          echo "Timed out waiting for in-progress Pages deployment"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - id: deployment
        uses: actions/deploy-pages@v4
